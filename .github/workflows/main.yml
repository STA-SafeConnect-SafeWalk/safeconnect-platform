name: Main CI/CD Flow

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-central-1

jobs:
  check-pr-title:
    if: github.event_name == 'pull_request'
    name: Check PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR Title Format
        uses: ./.github/actions/check-title
        with:
          title: ${{ github.event.pull_request.title }}

      - name: Comment on PR if invalid
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## PR Title Format Check Failed

            Your PR title does not match the required conventional commit format.

            **Expected format:** \`<type>[(scope)]: [SW-XXX] <description>\`

            **Valid types:** build, chore, ci, config, docs, feat, fix, perf, refactor, revert, style, test

            **Scope:** Optional, alphanumeric

            **Kanban reference:** Required, format \`[SW-XXX]\`

            Please update your PR title to match this format.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (lambda)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: lambda/package-lock.json

      - name: Install lambda dependencies
        working-directory: lambda
        run: npm ci

      - name: Run unit and integration tests
        working-directory: lambda
        run: npm test

      - name: Setup Node.js (root)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

  deploy-infra:
    name: Deploy Infrastructure
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Infrastructure
        uses: ./.github/actions/deploy-infra
        with:
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ${{ env.AWS_REGION }}
